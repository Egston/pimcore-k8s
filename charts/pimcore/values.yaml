replicaCount: 1

nameOverride: ""
fullnameOverride: ""

pimcore:
  tag: main
  appEnv: dev
  appSecret: ChangeMe123!
  databaseURL: mysql://pimcore:pimcore@mysql-mariadb.pimcore.svc.cluster.local:3306/app?serverVersion=5.7
  redisServer: redis-master.pimcore.svc.cluster.local
  redisPassword: ChangeMe123

  # composer create-project pimcore/demo
  # composer create-project pimcore/skeleton
  # Note: update customConfigFiles below if you change the project type
  createProject: pimcore/skeleton

  username: admin
  password: ChangeMe123!

  db:
    name: pimcore
    host: mysql-mariadb.pimcore.svc.cluster.local
    port: 3306
    username: pimcore
    password: ChangeMe123!

  customConfigFiles:
    config-yaml:
      enabled: false
      localPath: "pimcore-config/skeleton/config.yaml"
      containerPath: config/config.yaml
    bundles-php:
      enabled: false
      localPath: "pimcore-config/skeleton/bundles.php"
      containerPath: config/bundles.php

  customEnvVars: [] # [{ name: "CUSTOM_VAR", value: "custom-value" }, ...]

php:
  imagePullSecrets: []
  image:
    pullPolicy: Always
    # defaults to official pimcore PHP image(s), see:
    # - https://hub.docker.com/r/pimcore/pimcore/tags
    # - https://github.com/pimcore/docker
    # It's based on Debian
    registry: pimcore/pimcore
    tag: php8.2-latest
  replicas: 1
  service:
    type: ClusterIP
    port: 9000
  # user and group for the PHP-FPM and installation/maintenance jobs
  # this user must also exist in the PHP-FPM image
  phpUser:
    userName: www-data
    uid: 33
    groupName: www-data
    gid: 33
  fpmPool:
    pm: dynamic
    pmMaxChildren: 100
    pmStartServers: 3
    pmMinSpareServers: 3
    pmMaxSpareServers: 8
    pmMaxRequests: 10000
    pmProcessIdleTimeout: 10s
  resources:
    requests:
      cpu: 4
      memory: 8Gi
      ephemeral-storage: 5Gi
    limits:
      cpu: 4
      memory: 8Gi
      ephemeral-storage: 5Gi
  ## Probes for the php-fpm container.
  ## livenessProbe is TCP-only — catches "FPM master crashed", not stuck
  ## workers (FPM recovers those via request_terminate_timeout).
  ## readinessProbe is OPT-IN. With single-replica deployments, marking the
  ## only PHP pod NotReady during a slow cache:clear empties the Service
  ## endpoints and produces 502s. Enable when running `php.replicas >= 2`,
  ## where K8s can shift traffic to a healthy sibling.
  livenessProbe:
    enabled: true
    tcpSocket:
      port: 9000
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 3
    failureThreshold: 5
  readinessProbe:
    enabled: false
    tcpSocket:
      port: 9000
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  ini:
    # pimcore/pimcore image defaults
    #
    # phpMemoryLimit: 512M
    # phpMaxExecutionTime: 30
    # phpErrorReporting: E_ALL
    # phpDisplayErrors: ""
    # phpDisplayStartupErrors: 1
    # phpPostMaxSize: 100M
    # phpUploadMaxFilesize: 100M
    # opcacheEnable: 1
    # opcacheEnableCli: 0
    # opcacheMemoryConsumption: 128
    # opcacheMaxAcceleratedFiles: 10000
    # opcacheValidateTimestamps: 1
    # opcacheConsistencyChecks: 0
    #
    pimcore:
      phpMemoryLimit: 512M  # e.g. create very large GraphQL JSON responses can exceed 256M
      phpMaxExecutionTime: 300
      phpErrorReporting: E_ALL
      phpDisplayErrors: "Off"
      phpDisplayStartupErrors: 1
      phpPostMaxSize: 100M
      phpUploadMaxFilesize: 100M
      opcacheEnable: 1
      opcacheEnableCli: 0
      opcacheMemoryConsumption: 512
      opcacheMaxAcceleratedFiles: 10000
      opcacheValidateTimestamps: 1
      opcacheConsistencyChecks: 0
    maintenance:
      # if not set, use pimcore values
      cronjob:
        phpMemoryLimit: 512M
        phpMaxExecutionTime: 0
      worker:
        phpMemoryLimit: 512M
        phpMaxExecutionTime: 0
      shell:
        phpMemoryLimit: 0
        phpMaxExecutionTime: 0
    installation:
      # for installation hooks (install, initialize, migrate)
      # if not set, use pimcore values
      phpMemoryLimit: 512M
      phpMaxExecutionTime: 0

nginx:
  imagePullSecrets: []
  image:
    pullPolicy: Always
    # Oficial Nginx images, does not support Brotli compression
    # registry: nginx
    # tag: 1.27.2-alpine3.20
    # Custom Nginx image automatically built from the official Nginx image + Brotli support
    registry: georgjung/nginx-brotli
    tag: 1.27.2-alpine3.20
  compression:
    enabled: true
    gzip:
      enabled: true
      min_length: 1000
      comp_level: 1
      types: "text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript"
    brotli:
      enabled: true
      comp_level: 6
      types: "text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript"
  replicas: 1
  tag: master
  service:
    type: ClusterIP
    port: 80
  annotations:
    "cloud.google.com/neg": '{"ingress": true}'
  backendConfig:
    # GKE Ingress backend config
    # Turn this off for minikube or other Kubernetes distributions
    enabled: true
    timeoutSec: 300
    healthCheck:
      checkIntervalSec: 30
      timeoutSec: 30
      healthyThreshold: 2
      unhealthyThreshold: 2
      ## /livez is a dedicated static endpoint baked into the nginx serverblock
      ## (`return 200 "ok\n"`). It is served by nginx itself with no PHP-FPM
      ## involvement, so the LB probe stays responsive during Symfony
      ## cache:clear cycles. Avoid changing to a path that routes through
      ## index.php (e.g. `/admin/login`) — those block on the kernel rebuild
      ## during cache:clear and produce probe failures mid-clear.
      requestPath: "/livez"
      type: HTTP
      port: 80
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
      ephemeral-storage: 256Mi
  clientMaxBodySize: 100m
  cacheControl:
    assets: 'public, max-age=300, must-revalidate'
    thumbnails: 'public, max-age=300, must-revalidate'
  sharedFolders:
    - public
    # bundles assets
    - vendor
  ## Probes for the nginx container.
  ##
  ## livenessProbe is TCP-only on port 80 — catches "nginx process crashed",
  ## not application state. Stays cache:clear-immune by design.
  ##
  ## readinessProbe is OPT-IN. The default path is /readyz (kubelet
  ## convention) — what serves it is the consumer's choice (a Pimcore
  ## health-check bundle, a custom controller, a static nginx location,
  ## etc.). Override `httpGet.path` to point elsewhere if your readiness
  ## endpoint lives at a different URL.
  ##
  ## Two operational caveats apply regardless of how /readyz is served:
  ##
  ## 1. If the readiness endpoint goes through PHP-FPM, it deliberately
  ##    stalls during Symfony cache:clear. On this chart's shared-PVC
  ##    topology (var/cache mounted RWX into all pods), cache:clear hits
  ##    every replica simultaneously — there is no healthy peer to route
  ##    to. With nginx.replicas: 1, that becomes a user-visible outage
  ##    every cache:clear. Enable readiness only with replicas >= 2 and
  ##    accept that cache:clear is then an operational concern handled
  ##    outside the probes (e.g. don't run cache:clear against running
  ##    prod pods; ride deploys instead).
  ##
  ## 2. If the readiness endpoint is served statically by nginx (no PHP),
  ##    the probe degenerates to "is nginx up" — same signal as liveness.
  ##    In that case, leaving readiness disabled is fine.
  livenessProbe:
    enabled: true
    tcpSocket:
      port: 80
    initialDelaySeconds: 5
    periodSeconds: 30
    timeoutSeconds: 3
    failureThreshold: 3
  readinessProbe:
    enabled: false
    httpGet:
      path: /readyz
      port: 80
    initialDelaySeconds: 2
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

installation:
  resources:
    requests:
      cpu: 1
      memory: 2Gi
      ephemeral-storage: 1Gi
    limits:
      cpu: 1
      memory: 2Gi
      ephemeral-storage: 1Gi

maintenance:
  cronjob:
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
        ephemeral-storage: 3Gi
      limits:
        cpu: 500m
        memory: 1Gi
        ephemeral-storage: 3Gi
  worker:
    replicas: 1
    extraTransports: [] # additional messenger:consume transport names, e.g. ["yageo_translation"]
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
        ephemeral-storage: 3Gi
      limits:
        cpu: 500m
        memory: 1Gi
        ephemeral-storage: 3Gi
    ## Probe for the messenger consumer.
    ## Catches the case where the wrapper sh stays alive but the inner
    ## messenger:consume process has died — Redis Streams back up unnoticed
    ## without this. `pgrep -x php` matches only the actual PHP worker by
    ## binary name. Brief gaps during the 5s sleep between iterations are
    ## tolerated by failureThreshold * periodSeconds.
    livenessProbe:
      enabled: true
      exec:
        command:
          - sh
          - -c
          - "pgrep -x php >/dev/null"
      initialDelaySeconds: 60
      periodSeconds: 60
      timeoutSeconds: 5
      failureThreshold: 3
  shell:
    replicas: 0
    resources:
      requests:
        cpu: 1
        memory: 2Gi
        ephemeral-storage: 3Gi
      limits:
        cpu: 1
        memory: 2Gi
        ephemeral-storage: 3Gi
    maintainer:
      userName: maintainer
      userId: 1000
      groupName: developers
      groupId: 1200
    installPackages: ranger vim procps
    entrypointAdditionalCommands: |
      apt-get install -y git
      su - maintainer -c "
        git config --global --add safe.directory /var/www/pimcore;
        git config --global user.name 'Pimcore Maintainer';
        git config --global user.email 'maintainer@example.com';
      "
  # Generic console command CronJobs — define any number of scheduled bin/console commands.
  # Each key becomes a CronJob named "<release>-<key>".
  # Example:
  #   consoleCronjobs:
  #     translation-digests:
  #       enabled: true
  #       schedule: "0 8 * * *"           # daily at 8:00 UTC
  #       command: "yageo:translation:send-email-digests"
  #       # Optional overrides (all have sensible defaults):
  #       # resources: { requests: { cpu: 250m, memory: 512Mi }, limits: { ... } }
  #       # concurrencyPolicy: Forbid
  #       # restartPolicy: OnFailure
  #       # ttlSecondsAfterFinished: 60
  #       # activeDeadlineSeconds: 300
  #       # startingDeadlineSeconds: 200
  #       # successfulJobsHistoryLimit: 3
  #       # failedJobsHistoryLimit: 1
  consoleCronjobs: {}
  mysqlBackup:
    enabled: false
    imagePullSecrets: []
    # Debian based MariaDB image with mysqldump
    image:
      pullPolicy: Always
      registry: mariadb
      tag: 10.5
    compression:
      # compression tool to use for MySQL backups, Debian package name must match the tool binary
      # Supported tools: gzip, pigz, xz, pixz, bzip2, pbzip2, lbzip2, zstd, zstdmt, lz4
      # leave empty to disable compression
      tool: "pigz"
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
        ephemeral-storage: 2Gi
      limits:
        cpu: 500m
        memory: 1Gi
        ephemeral-storage: 2Gi

pvc:
  data:
    ## @param pvc.data.existingClaim Name of an existing `PersistentVolumeClaim`
    ## for Pimcore installation and data
    ## NOTE: When it's set the rest of the `pvc.data.*` apart from `pvc.data.subPath`
    ## are ignored
    ##
    existingClaim: ""  # if set other pvc.data.* are ignored
    ## @param pvc.data.subPath SubPath within the volume to mount as /var/www/pimcore
    ##
    subPath: pimcore
    name: data
    storage: 10Gi
    accessMode: ReadWriteMany
    storageClass: ""
    initFromRepo:
      # Instead of running `composer create-project` during the installation, clone an existing repo
      enabled: false
      gitRepositoryUrl: ChangeMe123!
      # If you need to use a different Git user than `git` (default), set it here
      # PAT access to GitHub, Azure DevOps, GitLab, etc. does not require a specific user, it just
      # cannot be empty
      gitUserName: git
      # if set, it will be used for authentication, injected as PIMCORE_INIT_REPO_GIT_USER env var
      # in installation job and maintenance shell deployment
      gitPersonalAccessToken: ""

  mysqlBackup:
    ## @param pvc.mysql-backup.existingClaim Name of an existing `PersistentVolumeClaim`
    ## for MySQL backups
    ## NOTE: When it's set the rest of the `pvc.mysql-backup.*` apart from `pvc.mysql-backup.subPath`
    ## are ignored
    ##
    existingClaim: ""  # if set other pvc.mysql-backup.* are ignored
    ## @param pvc.mysql-backup.subPath SubPath within the volume to mount as /var/www/pimcore
    ##
    subPath: pimcore-mysql-backup
    name: mysql-backup
    storage: 10Gi
    accessMode: ReadWriteOnce
    storageClass: ""

serviceAccount:
  create: true
  annotations: { }
  name: ""

podAnnotations: { }

podSecurityContext: { }

securityContext: { }

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: { }

tolerations:
  nginx:
  php:
  maintenance:

affinity: { }
