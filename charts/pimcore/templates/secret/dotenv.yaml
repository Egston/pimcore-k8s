apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pimcore.fullname" . }}-dotenv
  labels:
    {{- include "pimcore.labels" . | nindent 4 }}
type: Opaque
data:
    {{ with .Values.pimcore.db }}
    DB_ROOT_PASSWORD: {{ printf "root" | b64enc }}
    DB_USER: {{ .username | b64enc }}
    DB_PASSWORD: {{ required "pimcore.db.password is empty — set a non-empty DB password (an empty-but-set value renders a green apply with an unauthenticatable database)" .password | b64enc }}
    DB_DATABASE: {{ .name | b64enc }}
    DB_PORT: {{ printf "%s" .port | b64enc }}
    # Pimcore's functional test suite reads PIMCORE_TEST_DB_DSN (the test-env
    # doctrine config nulls the default connection); point it at the same DB,
    # password url-encoded (mirrors REDIS_DSN below). Only read under APP_ENV=test.
    PIMCORE_TEST_DB_DSN: {{ printf "mysql://%s:%s@%s:%d/%s" .username (.password | urlquery) .host (.port | int) .name | b64enc }}
    {{- end }}
    APP_ENV: {{ .Values.pimcore.appEnv | b64enc }}
    APP_SECRET: {{ .Values.pimcore.appSecret | b64enc }}
    REDIS_SERVER: {{ .Values.pimcore.redisServer | b64enc }}
    REDIS_PASSWORD: {{ required "pimcore.redisPassword is empty — set a non-empty Redis password (an empty-but-set value renders a green apply with an unauthenticatable cluster)" .Values.pimcore.redisPassword | b64enc }}
    REDIS_DSN: {{ printf "redis://%s@%s" (.Values.pimcore.redisPassword | urlquery) .Values.pimcore.redisServer | b64enc }}

    # pimcore installation
    {{ with .Values.pimcore.db }}
    PIMCORE_INSTALL_MYSQL_USERNAME: {{ .username | b64enc }}
    PIMCORE_INSTALL_MYSQL_PASSWORD: {{ .password | b64enc }}
    {{- end }}
    {{ with .Values.pimcore }}
    PIMCORE_INSTALL_ADMIN_USERNAME: {{ .username | b64enc }}
    PIMCORE_INSTALL_ADMIN_PASSWORD: {{ .password | b64enc }}
    {{- end }}
    # Skip nil/empty values: helm strvals may deliver an empty --set /
    # --set-string array value as nil depending on flag order, and toString
    # on nil renders the literal "<nil>" into the pod env (it also flaps the
    # rendered checksum between runs). An empty-string data key would be
    # dropped by the API server anyway, so omit the key entirely — the pod
    # env var stays unset and the app's .env default applies.
    {{- range .Values.pimcore.customEnvVars }}
    {{- if .value }}
    {{ .name }}: {{ .value | toString | b64enc }}
    {{- end }}
    {{- end }}

