replicaCount: 1

nameOverride: ""
fullnameOverride: ""

pimcore:
  tag: main
  appEnv: dev
  appSecret: ChangeMe123!
  databaseURL: mysql://pimcore:pimcore@mysql-mariadb.pimcore.svc.cluster.local:3306/app?serverVersion=5.7
  redisServer: redis-master.pimcore.svc.cluster.local
  redisPassword: ChangeMe123

  # composer create-project pimcore/demo
  # composer create-project pimcore/skeleton
  # Note: update customConfigFiles below if you change the project type
  createProject: pimcore/skeleton

  username: admin
  password: ChangeMe123!

  db:
    name: pimcore
    host: mysql-mariadb.pimcore.svc.cluster.local
    port: 3306
    username: pimcore
    password: ChangeMe123!

  customConfigFiles:
    config-yaml:
      enabled: false
      localPath: "pimcore-config/skeleton/config.yaml"
      containerPath: config/config.yaml
    bundles-php:
      enabled: false
      localPath: "pimcore-config/skeleton/bundles.php"
      containerPath: config/bundles.php

  customEnvVars: [] # [{ name: "CUSTOM_VAR", value: "custom-value" }, ...]

php:
  imagePullSecrets: []
  image:
    pullPolicy: Always
    # defaults to official pimcore PHP image(s), see:
    # - https://hub.docker.com/r/pimcore/pimcore/tags
    # - https://github.com/pimcore/docker
    # It's based on Debian
    registry: pimcore/pimcore
    tag: php8.2-latest
  replicas: 1
  service:
    type: ClusterIP
    port: 9000
  # user and group for the PHP-FPM and installation/maintenance jobs
  # this user must also exist in the PHP-FPM image
  phpUser:
    userName: www-data
    uid: 33
    groupName: www-data
    gid: 33
  fpmPool:
    pm: dynamic
    pmMaxChildren: 100
    pmStartServers: 3
    pmMinSpareServers: 3
    pmMaxSpareServers: 8
    pmMaxRequests: 10000
    pmProcessIdleTimeout: 10s
  resources:
    requests:
      cpu: 4
      memory: 8Gi
      ephemeral-storage: 5Gi
    limits:
      cpu: 4
      memory: 8Gi
      ephemeral-storage: 5Gi
  ## Probes for the php-fpm container.
  ##
  ## startupProbe + livenessProbe both target FPM's built-in `ping.path`
  ## (configured in php-fpm-d-zzzz-www-pool-conf.yaml as /fpm-ping → "pong").
  ## FPM intercepts ping requests in the master before any worker dispatch,
  ## so the probe is cache:clear-immune AND a real end-to-end signal —
  ## confirms FPM master + dispatch table + worker pool are alive.
  ##
  ## Requires `cgi-fcgi` (libfcgi-bin) in the image. Custom Dockerfile:
  ##   RUN apt-get update && apt-get install -y --no-install-recommends \
  ##       libfcgi-bin procps && rm -rf /var/lib/apt/lists/*
  ## The verify-probe-deps initContainer fails the pod fast at startup if
  ## either binary is missing.
  ##
  ## startupProbe gives 5min grace so initial cold-cache PHP boot doesn't
  ## flap liveness. Once startupProbe passes it stops running entirely;
  ## liveness continues for the pod's lifetime (periodSeconds: 30).
  ##
  ## readinessProbe is OPT-IN. The TCP variant only signals "FPM master
  ## alive" (symbolic — TCP accept happens regardless of worker state). For
  ## meaningful application-level readiness, prefer the nginx readinessProbe
  ## targeting /readyz, which exercises the full request path. Enable this
  ## PHP-side readiness only if you specifically want per-PHP-pod TCP signal
  ## in addition.
  startupProbe:
    enabled: true
    exec:
      command:
        - sh
        - -c
        - 'set -o pipefail; SCRIPT_NAME=/fpm-ping SCRIPT_FILENAME=/fpm-ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 | grep -qx pong'
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
  livenessProbe:
    enabled: true
    exec:
      command:
        - sh
        - -c
        - 'set -o pipefail; SCRIPT_NAME=/fpm-ping SCRIPT_FILENAME=/fpm-ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 | grep -qx pong'
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    enabled: false
    tcpSocket:
      port: 9000
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  ini:
    # pimcore/pimcore image defaults
    #
    # phpMemoryLimit: 512M
    # phpMaxExecutionTime: 30
    # phpErrorReporting: E_ALL
    # phpDisplayErrors: ""
    # phpDisplayStartupErrors: 1
    # phpPostMaxSize: 100M
    # phpUploadMaxFilesize: 100M
    # opcacheEnable: 1
    # opcacheEnableCli: 0
    # opcacheMemoryConsumption: 128
    # opcacheMaxAcceleratedFiles: 10000
    # opcacheValidateTimestamps: 1
    # opcacheConsistencyChecks: 0
    #
    pimcore:
      phpMemoryLimit: 512M  # e.g. create very large GraphQL JSON responses can exceed 256M
      phpMaxExecutionTime: 300
      phpErrorReporting: E_ALL
      phpDisplayErrors: "Off"
      phpDisplayStartupErrors: 1
      phpPostMaxSize: 100M
      phpUploadMaxFilesize: 100M
      opcacheEnable: 1
      opcacheEnableCli: 0
      opcacheMemoryConsumption: 512
      opcacheMaxAcceleratedFiles: 10000
      opcacheValidateTimestamps: 1
      opcacheConsistencyChecks: 0
    maintenance:
      # if not set, use pimcore values
      cronjob:
        phpMemoryLimit: 512M
        phpMaxExecutionTime: 0
      worker:
        phpMemoryLimit: 512M
        phpMaxExecutionTime: 0
      shell:
        phpMemoryLimit: 0
        phpMaxExecutionTime: 0
    installation:
      # for installation hooks (install, initialize, migrate)
      # if not set, use pimcore values
      phpMemoryLimit: 512M
      phpMaxExecutionTime: 0

nginx:
  imagePullSecrets: []
  image:
    pullPolicy: Always
    # Oficial Nginx images, does not support Brotli compression
    # registry: nginx
    # tag: 1.27.2-alpine3.20
    # Custom Nginx image automatically built from the official Nginx image + Brotli support
    registry: georgjung/nginx-brotli
    tag: 1.27.2-alpine3.20
  compression:
    enabled: true
    gzip:
      enabled: true
      min_length: 1000
      comp_level: 1
      types: "text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript"
    brotli:
      enabled: true
      comp_level: 6
      types: "text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript"
  replicas: 1
  tag: master
  service:
    type: ClusterIP
    port: 80
  annotations:
    "cloud.google.com/neg": '{"ingress": true}'
  backendConfig:
    # GKE Ingress backend config
    # Turn this off for minikube or other Kubernetes distributions
    enabled: true
    timeoutSec: 300
    healthCheck:
      checkIntervalSec: 30
      timeoutSec: 30
      healthyThreshold: 2
      unhealthyThreshold: 2
      ## /livez is a dedicated static endpoint baked into the nginx serverblock
      ## (`return 200 "ok\n"`). It is served by nginx itself with no PHP-FPM
      ## involvement, so the LB probe stays responsive during Symfony
      ## cache:clear cycles. Avoid changing to a path that routes through
      ## index.php (e.g. `/admin/login`) — those block on the kernel rebuild
      ## during cache:clear and produce probe failures mid-clear.
      requestPath: "/livez"
      type: HTTP
      port: 80
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
      ephemeral-storage: 256Mi
  clientMaxBodySize: 100m
  cacheControl:
    assets: 'public, max-age=300, must-revalidate'
    thumbnails: 'public, max-age=300, must-revalidate'
  sharedFolders:
    - public
    # bundles assets
    - vendor
  ## Probes for the nginx container.
  ##
  ## livenessProbe targets /livez — a static endpoint baked into the
  ## nginx serverblock (`return 200 "ok\n"`). No PHP-FPM involvement,
  ## cache:clear-immune. Don't change this to a path that hits PHP —
  ## liveness failures kill the pod, and a cache:clear stall would
  ## restart-loop the deployment.
  ##
  ## startupProbe also defaults to /livez — the chart cannot assume an
  ## application-level health endpoint exists in the consuming Pimcore
  ## installation. Consumers serving a richer /readyz (e.g. a Pimcore
  ## health-check bundle, a custom controller, a static return) are
  ## strongly encouraged to override `startupProbe.httpGet.path` to
  ## /readyz: doing so makes rolling deploys gate on full application
  ## readiness (DB connection, cache write/read, GraphQL roundtrip, …)
  ## before the new pod is declared Started. K8s won't kill the old
  ## pod until the new one passes startup, so a half-broken new pod
  ## cannot replace a working old one — that's the only rolling-deploy
  ## safety mechanism available at replicas: 1, where readiness is no
  ## help (no peer to drain to). When overriding, bump
  ## `startupProbe.timeoutSeconds` to accommodate the slower endpoint
  ## (typically 10-15s; pure-static /livez fits comfortably in 3s).
  ##
  ## readinessProbe is OPT-IN, intended for replicas >= 2 deployments
  ## that want individual pods to drop out of the Service when their
  ## /readyz starts failing. At replicas: 1 leaving it disabled is the
  ## right call — there is no peer to drain to, so a flap during
  ## cache:clear would empty the endpoint set entirely and produce
  ## user-visible 5xx. Default path /readyz; override to point
  ## elsewhere if your readiness endpoint is at a different URL.
  ##
  ## Caveat at replicas >= 2: the chart mounts pimcore-data PVC into
  ## every nginx pod at the same subPath, so var/cache is shared across
  ## replicas. A cache:clear blasts every replica simultaneously rather
  ## than only the one currently being deployed — which means readiness
  ## flapping during cache:clear can still empty the Service endpoint
  ## set even at replicas: 2+. Cache:clear is then an operational concern
  ## (avoid running it against live prod pods; ride deploys instead),
  ## not something readiness can rescue you from.
  startupProbe:
    enabled: true
    httpGet:
      path: /livez
      port: 80
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 60
  livenessProbe:
    enabled: true
    httpGet:
      path: /livez
      port: 80
    periodSeconds: 30
    timeoutSeconds: 3
    failureThreshold: 3
  readinessProbe:
    enabled: false
    httpGet:
      path: /readyz
      port: 80
    initialDelaySeconds: 2
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

installation:
  resources:
    requests:
      cpu: 1
      memory: 2Gi
      ephemeral-storage: 1Gi
    limits:
      cpu: 1
      memory: 2Gi
      ephemeral-storage: 1Gi

maintenance:
  cronjob:
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
        ephemeral-storage: 3Gi
      limits:
        cpu: 500m
        memory: 1Gi
        ephemeral-storage: 3Gi
  worker:
    replicas: 1
    extraTransports: [] # additional messenger:consume transport names, e.g. ["yageo_translation"]
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
        ephemeral-storage: 3Gi
      limits:
        cpu: 500m
        memory: 1Gi
        ephemeral-storage: 3Gi
    ## Probe for the messenger consumer.
    ##
    ## Requires `pgrep` (procps) in the image. Custom Dockerfile:
    ##   RUN apt-get update && apt-get install -y --no-install-recommends \
    ##       procps && rm -rf /var/lib/apt/lists/*
    ## The verify-probe-deps initContainer fails the pod fast at startup
    ## if the binary is missing.
    livenessProbe:
      enabled: true
      exec:
        command:
          - sh
          - -c
          - "pgrep -f messenger:consume >/dev/null"
      initialDelaySeconds: 60
      periodSeconds: 60
      timeoutSeconds: 5
      failureThreshold: 3
  shell:
    replicas: 0
    resources:
      requests:
        cpu: 1
        memory: 2Gi
        ephemeral-storage: 3Gi
      limits:
        cpu: 1
        memory: 2Gi
        ephemeral-storage: 3Gi
    maintainer:
      userName: maintainer
      userId: 1000
      groupName: developers
      groupId: 1200
    installPackages: ranger vim procps
    entrypointAdditionalCommands: |
      apt-get install -y git
      su - maintainer -c "
        git config --global --add safe.directory /var/www/pimcore;
        git config --global user.name 'Pimcore Maintainer';
        git config --global user.email 'maintainer@example.com';
      "
  # Generic console command CronJobs — define any number of scheduled bin/console commands.
  # Each key becomes a CronJob named "<release>-<key>".
  # Example:
  #   consoleCronjobs:
  #     translation-digests:
  #       enabled: true
  #       schedule: "0 8 * * *"           # daily at 8:00 UTC
  #       command: "yageo:translation:send-email-digests"
  #       # Optional overrides (all have sensible defaults):
  #       # resources: { requests: { cpu: 250m, memory: 512Mi }, limits: { ... } }
  #       # concurrencyPolicy: Forbid
  #       # restartPolicy: OnFailure
  #       # ttlSecondsAfterFinished: 60
  #       # activeDeadlineSeconds: 300
  #       # startingDeadlineSeconds: 200
  #       # successfulJobsHistoryLimit: 3
  #       # failedJobsHistoryLimit: 1
  consoleCronjobs: {}
  mysqlBackup:
    enabled: false
    imagePullSecrets: []
    # Debian based MariaDB image with mysqldump
    image:
      pullPolicy: Always
      registry: mariadb
      tag: 10.5
    compression:
      # compression tool to use for MySQL backups, Debian package name must match the tool binary
      # Supported tools: gzip, pigz, xz, pixz, bzip2, pbzip2, lbzip2, zstd, zstdmt, lz4
      # leave empty to disable compression
      tool: "pigz"
    replicas: 1
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
        ephemeral-storage: 2Gi
      limits:
        cpu: 500m
        memory: 1Gi
        ephemeral-storage: 2Gi

pvc:
  data:
    ## @param pvc.data.existingClaim Name of an existing `PersistentVolumeClaim`
    ## for Pimcore installation and data
    ## NOTE: When it's set the rest of the `pvc.data.*` apart from `pvc.data.subPath`
    ## are ignored
    ##
    existingClaim: ""  # if set other pvc.data.* are ignored
    ## @param pvc.data.subPath SubPath within the volume to mount as /var/www/pimcore
    ##
    subPath: pimcore
    name: data
    storage: 10Gi
    accessMode: ReadWriteMany
    storageClass: ""
    initFromRepo:
      # Instead of running `composer create-project` during the installation, clone an existing repo
      enabled: false
      gitRepositoryUrl: ChangeMe123!
      # If you need to use a different Git user than `git` (default), set it here
      # PAT access to GitHub, Azure DevOps, GitLab, etc. does not require a specific user, it just
      # cannot be empty
      gitUserName: git
      # if set, it will be used for authentication, injected as PIMCORE_INIT_REPO_GIT_USER env var
      # in installation job and maintenance shell deployment
      gitPersonalAccessToken: ""

  mysqlBackup:
    ## @param pvc.mysql-backup.existingClaim Name of an existing `PersistentVolumeClaim`
    ## for MySQL backups
    ## NOTE: When it's set the rest of the `pvc.mysql-backup.*` apart from `pvc.mysql-backup.subPath`
    ## are ignored
    ##
    existingClaim: ""  # if set other pvc.mysql-backup.* are ignored
    ## @param pvc.mysql-backup.subPath SubPath within the volume to mount as /var/www/pimcore
    ##
    subPath: pimcore-mysql-backup
    name: mysql-backup
    storage: 10Gi
    accessMode: ReadWriteOnce
    storageClass: ""

serviceAccount:
  create: true
  annotations: { }
  name: ""

podAnnotations: { }

podSecurityContext: { }

securityContext: { }

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: { }

tolerations:
  nginx:
  php:
  maintenance:

affinity: { }
