apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pimcore.fullname" . }}-maintenance-worker
  labels:
    {{- include "pimcore.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.maintenance.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "pimcore.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}-maintenance-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "pimcore.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}-maintenance-worker
      annotations:
        checksum/php-env-vars: {{ include (print $.Template.BasePath "/maintenance/configmap/maintenance-worker-env.yaml") . | sha256sum }}
        checksum/secret-env-vars: {{ include (print $.Template.BasePath "/secret/dotenv.yaml") . | sha256sum }}
        checksum/php-fpm-conf: {{ include (print $.Template.BasePath "/php/configmap/php-fpm-conf.yaml") . | sha256sum }}
        checksum/php-fpm-d-zzzz-www-pool-conf: {{ include (print $.Template.BasePath "/php/configmap/php-fpm-d-zzzz-www-pool-conf.yaml") . | sha256sum }}
        checksum/php-ini: {{ include (print $.Template.BasePath "/php/configmap/php-ini.yaml") . | sha256sum }}
        checksum/php-conf-d-30-pimcore-ini: {{ include (print $.Template.BasePath "/php/configmap/php-conf-d-30-pimcore-ini.yaml") . | sha256sum }}
        checksum/pimcore-configmap: {{ include (print $.Template.BasePath "/pimcore-configmap.yaml") . | sha256sum }}
    spec:
    {{- with .Values.php.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      serviceAccountName: {{ include "pimcore.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        # wait for pimcore to be installed because we need the SubPath in volumeMounts
        # already exist when the container starts
        {{- include "pimcore.initContainers.wait-for-pimcore-installed" . | nindent 8 }}
        {{- if .Values.maintenance.worker.livenessProbe.enabled }}
        {{- include "pimcore.initContainers.verify-probe-deps" (dict "image" .Values.php.image "binaries" (list "pgrep")) | nindent 8 }}
        {{- end }}
      containers:
        - name: maintenance-worker
          image: "{{ .Values.php.image.registry }}:{{ .Values.php.image.tag }}"
          imagePullPolicy: {{ .Values.php.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          # PHP can't be PID 1: the kernel drops default-fatal signals to
          # PID 1 unless a handler is armed at the moment of delivery, which
          # races Symfony's SignalRegistry init. Shell at PID 1 with a trap
          # on line one is always armed first; it forwards TERM to the PHP
          # child (PID 2, in-namespace kills bypass the PID-1 rule) and
          # waits for the Messenger drain before exiting.
          args:
            - |
              cd /var/www/pimcore
              trap 'kill -TERM "$child" 2>/dev/null; wait "$child" 2>/dev/null; exit 0' TERM INT
              while true; do
                php bin/console messenger:consume pimcore_core pimcore_maintenance pimcore_search_backend_message pimcore_scheduled_tasks pimcore_image_optimize pimcore_asset_update pimcore_data_import{{- range .Values.maintenance.worker.extraTransports }} {{ . }}{{- end }} --time-limit=3600 &
                child=$!
                wait "$child"
                child=""
                sleep 5
              done
          # K8s' own SIGTERM never reaches PID 1 through the runtime layer
          # (verified on minikube/cri-dockerd and GKE: SigPnd stays 0, no
          # Symfony "Received signal" until SIGKILL). preStop fires the trap
          # from inside the PID namespace where the kernel honours it, and
          # runs synchronously before the broken outer SIGTERM. The kill-0
          # loop blocks preStop until PID 1 exits, so in-flight messages
          # drain within terminationGracePeriodSeconds.
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - 'kill -TERM 1; while kill -0 1 2>/dev/null; do sleep 1; done'
          resources:
            {{- toYaml .Values.maintenance.worker.resources | nindent 12 }}
          {{- if .Values.maintenance.worker.livenessProbe.enabled }}
          livenessProbe:
            {{- omit .Values.maintenance.worker.livenessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ template "pimcore.fullname" . }}-maintenance-worker-env
            - secretRef:
                # intentionally second to override values, as it may contain custom user values
                name: {{ include "pimcore.fullname" . }}-dotenv
          securityContext:
            runAsUser: {{ .Values.php.phpUser.uid }}
            runAsGroup: {{ .Values.php.phpUser.gid }}
          volumeMounts:
            - name: php-ini
              mountPath: /usr/local/etc/php/php.ini
              subPath: php.ini
            - name: php-conf-d-30-pimcore-ini
              mountPath: /usr/local/etc/php/conf.d/30-pimcore.ini
              subPath: 30-pimcore.ini
            - name: php-fpm-conf
              mountPath: /usr/local/etc/php-fpm.conf
              subPath: php-fpm.conf
            - name: php-fpm-d-zzzz-www-pool-conf
              mountPath: /usr/local/etc/php-fpm.d/zzzz-www.conf
              subPath: zzzz-www-pool.conf
            - name: pimcore-data
              mountPath: /var/www/pimcore
              subPath: {{ .Values.pvc.data.subPath }}
            {{- range $name, $shared := .Values.pvc.data.sharedSubPaths }}
            - name: pimcore-data
              mountPath: {{ $shared.mountPath }}
              subPath: {{ $shared.subPath }}
            {{- end }}
            {{- include "pimcore.customConfigFiles.volumeMounts" . | nindent 12 }}
            {{- include "pimcore.mountedConfigDirs.volumeMounts" . | nindent 12 }}
      volumes:
        - name: pimcore-data
          persistentVolumeClaim:
            claimName: {{ template "pimcore.dataClaimName" . }}
        - name: php-ini
          configMap:
              name: {{ template "pimcore.fullname" . }}-php-ini
        - name: php-conf-d-30-pimcore-ini
          configMap:
            name: {{ template "pimcore.fullname" . }}-php-conf-d-30-pimcore-ini
        - name: php-fpm-conf
          configMap:
              name: {{ template "pimcore.fullname" . }}-php-fpm-conf
        - name: php-fpm-d-zzzz-www-pool-conf
          configMap:
            name: {{ template "pimcore.fullname" . }}-php-fpm-d-zzzz-www-pool-conf
        {{- include "pimcore.customConfigFiles.volumes" . | nindent 8 }}
        {{- include "pimcore.mountedConfigDirs.volumes" . | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
